<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamVault — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f2ebd9;
      font-family: 'Inter', system-ui, sans-serif;
      color: #2c251e;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      background: #5c3a21;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
    p  { color: #6b5c4f; font-size: .95rem; max-width: 360px; line-height: 1.6; margin-bottom: 2rem; }
    .badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: #fff7ed; border: 1px solid #f3c898;
      color: #8b5a2b; font-size: .75rem; font-weight: 600;
      padding: .4rem 1rem; border-radius: 999px; margin-bottom: 2rem;
    }
    button {
      background: #8b5a2b; color: #fff;
      border: none; border-radius: 12px;
      padding: .75rem 2rem; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #5c3a21; }
    small { display: block; margin-top: 1rem; color: #9e8c7f; font-size: .75rem; }
  </style>
</head>
<body>
  <div class="icon">🔒</div>
  <div class="badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 5a10.94 10.94 0 0 0-2.85 5.45M10.5 5.05A10.94 10.94 0 0 1 12 5c4.48 0 8.33 2.42 10.45 6A10.94 10.94 0 0 1 18.85 16.4"/>
    </svg>
    No internet connection
  </div>
  <h1>You're offline</h1>
  <p>
    DreamVault needs a connection to load for the first time.
    Once loaded, you can write new entries and they'll sync automatically when you're back online.
  </p>
  <button onclick="window.location.reload()">Try again</button>
  <small>Your existing entries are safely stored on this device.</small>
</body>
</html>
